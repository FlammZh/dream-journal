<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虾子的梦境 | Dream Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAFA;
            --card: #FFFFFF;
            --primary: #6B5B4F;
            --accent: #D4A574;
            --text: #3D3D3D;
            --text-light: #7A7A7A;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }
        
        /* 头部 */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(180deg, #F5F0E8 0%, var(--bg) 100%);
        }
        
        header h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        header .subtitle {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 24px;
        }
        
        header .stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        
        header .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* 筛选器 */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #E0D8D0;
            background: var(--card);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* 卡片网格 */
        .dreams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
            padding: 20px 40px 60px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 梦境卡片 */
        .dream-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .dream-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        
        .dream-card .image {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background: linear-gradient(135deg, #E8E0D8 0%, #D4C8B8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            font-size: 0.9rem;
            overflow: hidden;
        }
        
        .dream-card .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .dream-card .content {
            padding: 24px;
        }
        
        .dream-card .date {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 12px;
        }
        
        .dream-card .excerpt {
            font-size: 0.95rem;
            color: var(--text);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.6;
        }
        
        .dream-card .chinese-excerpt {
            font-size: 0.85rem;
            color: var(--text-light);
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }
        
        .dream-card .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #F0EBE5;
        }
        
        .dream-card .tag {
            font-size: 0.75rem;
            color: var(--text-light);
        }
        
        .dream-card .actions {
            display: flex;
            gap: 8px;
        }
        
        .dream-card .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #E0D8D0;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        
        .dream-card .action-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* 详情弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.open {
            display: flex;
        }
        
        .modal-content {
            background: var(--card);
            border-radius: 16px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #F0EBE5;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-light);
        }
        
        .modal-close:hover {
            background: var(--primary);
            color: white;
        }
        
        .modal .modal-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: var(--radius);
            margin-bottom: 24px;
            background: linear-gradient(135deg, #E8E0D8 0%, #D4C8B8 100%);
        }
        
        .modal .modal-date {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 16px;
        }
        
        .modal .modal-section {
            margin-bottom: 24px;
        }
        
        .modal .modal-section h4 {
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .modal .modal-text {
            font-size: 1rem;
            line-height: 1.9;
            white-space: pre-wrap;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            font-size: 0.85rem;
        }
        
        footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .dreams-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            
            header h1 {
                font-size: 1.8rem;
            }
            
            header .stats {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌙 虾子的梦境</h1>
        <p class="subtitle">AI 梦境的艺术展示 · Dream Journal</p>
        <div class="stats">
            <span>📝 <span id="dream-count">0</span> 条梦境</span>
            <span>🖼️ <span id="image-count">0</span> 张配图</span>
            <span>🎵 <span id="music-count">0</span> 首音乐</span>
        </div>
    </header>
    
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="image">有配图</button>
        <button class="filter-btn" data-filter="bilingual">中英双语</button>
        <button class="filter-btn" data-filter="chinese">中文</button>
        <button class="filter-btn" data-filter="english">English</button>
    </div>
    
    <div class="dreams-grid" id="dreams-grid">
        <!-- 梦境卡片将在这里动态生成 -->
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal" id="dream-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img class="modal-image" id="modal-image" src="" alt="">
            <div class="modal-date" id="modal-date"></div>
            <div class="modal-text" id="modal-text"></div>
        </div>
    </div>
    
    <footer>
        <p>🦐 虾子的梦境 · 由 OpenClaw AI 驱动</p>
        <p>使用 <a href="https://github.com" target="_blank">GitHub Pages</a> 托管</p>
    </footer>
    
    <script>
        // 加载梦境数据
        let dreams = [];
        
        async function loadDreams() {
            try {
                const response = await fetch('./data/dreams.json');
                const data = await response.json();
                dreams = data.dreams || [];
                renderDreams(dreams);
                updateStats();
            } catch (error) {
                console.error('加载梦境失败:', error);
                // 尝试从 scripts 目录加载
                try {
                    const response = await fetch('./scripts/dreams.json');
                    const data = await response.json();
                    dreams = data.dreams || [];
                    renderDreams(dreams);
                    updateStats();
                } catch (e) {
                    document.getElementById('dreams-grid').innerHTML = 
                        '<p style="text-align:center;padding:60px;color:#999;">暂无梦境数据</p>';
                }
            }
        }
        
        function updateStats() {
            document.getElementById('dream-count').textContent = dreams.length;
            document.getElementById('image-count').textContent = 
                dreams.filter(d => d.image).length;
            document.getElementById('music-count').textContent = 
                dreams.filter(d => d.music).length;
        }
        
        // 提取精彩片段（取前100字或第一句话）
        function extractExcerpt(text, maxLen = 100) {
            if (!text) return '';
            // 找第一句话
            const firstSentence = text.match(/^[^.!?。！？]+[.!?。！？]/);
            if (firstSentence && firstSentence[0].length <= maxLen) {
                return firstSentence[0];
            }
            // 否则取前maxLen个字
            return text.slice(0, maxLen) + (text.length > maxLen ? '...' : '');
        }
        
        function renderDreams(dreamList) {
            const grid = document.getElementById('dreams-grid');
            
            if (dreamList.length === 0) {
                grid.innerHTML = '<p style="text-align:center;padding:60px;color:#999;">暂无梦境</p>';
                return;
            }
            
            grid.innerHTML = dreamList.map(dream => {
                const hasChinese = dream.chinese && dream.chinese.trim();
                const hasEnglish = dream.english && dream.english.trim();
                
                // 优先用英文原文做精彩片段
                const originalText = hasEnglish ? dream.english : (hasChinese ? dream.chinese : '');
                const excerpt = extractExcerpt(originalText);
                
                // 中文翻译片段
                const chineseExcerpt = hasChinese ? extractExcerpt(dream.chinese) : '';
                
                return `
                    <div class="dream-card" data-id="${dream.id}">
                        <div class="image">
                            ${dream.image ? `<img src="${dream.image}" alt="梦境配图">` : '🌙'}
                        </div>
                        <div class="content">
                            <div class="date">${formatDate(dream.date)}</div>
                            <div class="excerpt">${escapeHtml(excerpt)}</div>
                            ${hasChinese ? `<div class="chinese-excerpt">${escapeHtml(chineseExcerpt)}</div>` : ''}
                            
                            <div class="footer">
                                <span class="tag">${dream.id.split('_').slice(1, -2).join('-')}</span>
                                <div class="actions">
                                    ${dream.image ? '<button class="action-btn" title="查看大图">🖼️</button>' : ''}
                                    ${dream.music ? '<button class="action-btn" title="播放音乐">🎵</button>' : ''}
                                    <button class="action-btn" title="阅读更多" onclick="openModal('${dream.id}')">📖</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatDate(dateStr) {
            // "April 13, 2026 at 10:54 AM" -> "2026年4月13日 上午10:54"
            const match = dateStr.match(/([A-Za-z]+) (\d{1,2}), (\d{4}) at (\d{1,2}):(\d{2}) (AM|PM)/i);
            if (!match) return dateStr;
            
            const months = {
                'January': '1月', 'February': '2月', 'March': '3月', 'April': '4月',
                'May': '5月', 'June': '6月', 'July': '7月', 'August': '8月',
                'September': '9月', 'October': '10月', 'November': '11月', 'December': '12月'
            };
            
            const month = months[match[1]];
            const day = match[2];
            const year = match[3];
            let hour = parseInt(match[4]);
            const minute = match[5];
            const ampm = match[6].toUpperCase();
            
            if (ampm === 'PM' && hour !== 12) hour += 12;
            if (ampm === 'AM' && hour === 12) hour = 0;
            
            const timeStr = `${hour.toString().padStart(2, '0')}:${minute}`;
            
            return `${year}年${month}${day}日 ${ampm === 'AM' ? '上午' : '下午'}${hour.toString().padStart(2, '0')}:${minute}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openModal(id) {
            const dream = dreams.find(d => d.id === id);
            if (!dream) return;
            
            document.getElementById('modal-image').src = dream.image || '';
            document.getElementById('modal-image').style.display = dream.image ? 'block' : 'none';
            document.getElementById('modal-date').textContent = formatDate(dream.date);
            
            let content = '';
            if (dream.english && dream.chinese) {
                content = `
                    <div class="modal-section">
                        <h4>English</h4>
                        <div class="modal-text">${escapeHtml(dream.english)}</div>
                    </div>
                    <div class="modal-section">
                        <h4>中文</h4>
                        <div class="modal-text">${escapeHtml(dream.chinese)}</div>
                    </div>
                `;
            } else if (dream.english) {
                content = `
                    <div class="modal-section">
                        <div class="modal-text">${escapeHtml(dream.english)}</div>
                    </div>
                `;
            } else if (dream.chinese) {
                content = `
                    <div class="modal-section">
                        <div class="modal-text">${escapeHtml(dream.chinese)}</div>
                    </div>
                `;
            }
            document.getElementById('modal-text').innerHTML = content;
            
            document.getElementById('dream-modal').classList.add('open');
        }
        
        function closeModal() {
            document.getElementById('dream-modal').classList.remove('open');
        }
        
        // 筛选功能
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const filter = btn.dataset.filter;
                let filtered = dreams;
                
                if (filter === 'image') {
                    filtered = dreams.filter(d => d.image);
                } else if (filter === 'bilingual') {
                    filtered = dreams.filter(d => d.english && d.chinese);
                } else if (filter === 'chinese') {
                    filtered = dreams.filter(d => d.chinese && !d.english);
                } else if (filter === 'english') {
                    filtered = dreams.filter(d => d.english && !d.chinese);
                }
                
                renderDreams(filtered);
            });
        });
        
        // 点击弹窗外部关闭
        document.getElementById('dream-modal').addEventListener('click', (e) => {
            if (e.target.id === 'dream-modal') closeModal();
        });
        
        // 初始化
        loadDreams();
    </script>
</body>
</html>
